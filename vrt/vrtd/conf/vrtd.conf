include-glob = vrtd.conf.d/*.conf

; Full access role: grants all subsystem permissions on all devices.
; Uses the new per-device sub-section syntax with the "any" wildcard.
[role:fullaccess]
query-devices = yes

[role:fullaccess:any]
bar-access = full
qdma = yes
buffer = yes
design-write = yes
clock = yes
pcie-hotplug = yes
raw-mem-access = yes

; Info-only role: can enumerate and query devices but not access them.
[role:info]
query-devices = yes

[user:root]
role = fullaccess

[group:vrtadmin]
role = fullaccess

[user:*]
role = info
